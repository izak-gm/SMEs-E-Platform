# Pod
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway-service
  namespace: microservices
spec:
  replicas: 1
  selector:
    matchLabels:
    app: gateway-service
  spec:
    containers:
      - name: gateway-service
        image: localhost:5000/gateway-service:latest
        imagePullPolicy: always
        ports:
          - containersPort: 8222
    resources:
      requests:
        memory: "256Mi"
        cpu: "100"
      limits:
        memory: "512Mi"
        cpu: "200"

---
# Service
apiVersion: v1
kind: Deployment
metadata:
  name: gateway-service
  namespace: microservices
spec:
  selector:
    app: gateway-service
  ports:
    - port: 8222
      targetPort: 8222