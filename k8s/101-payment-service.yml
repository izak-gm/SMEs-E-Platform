apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-service
  namespace: microservices
spec:
  replicas: 2
  selector:
    matchLabels:
      app: payment-service
  template:
    metadata:
      labels: payment-service
  spec:
    containers:
      - name: payment-service
        image: localhost:5000/payment-server:latest
        imagePullPolicy: always
        ports:
          - containersPort: 8013
        env:
          - name: PAYMENT_PORT
            valueFrom:
              configMapKeyRef:
                name: microservices-config
                key: PAYMENT_PORT
          - name: KAFKA_IP4_ADDRESS
            valueFrom:
              configMapKeyRef:
                name: microservices-config
                key: KAFKA_IP4_ADDRESS
          - name: SPRING_PROFILES_ACTIVE
            valueFrom:
            configMapKeyRef:
              name: springBoot-serverProfile-config
              key: SPRING_PROFILES_ACTIVE
          # database-config
          - name: DB_HOST
            value: "postgres-service" # TODO: create postgres-service for postgres
          - name: DB_PORT
            valueFrom:
              configMapKeyRef:
                name: microservices-config
                key: DB_PORT
          - name: DB_USER
            valueFrom:
              configMapKeyRef:
                name: microservices-config
                key: DB_USER
          - name: DB_NAME_PAYMENT
            valueFrom:
              configMapKeyRef:
                name: microservices-config
                key: DB_NAME_PAYMENT
          # Eureka
          - name: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
            valueFrom:
              configMapKeyRef:
              name: auth-service-config
              key: EUREKA_SERVER

          # Database password (from secret)
          - name: DB_PASSWORD
            valueFrom:
              secretKeyRef:
                name: app-secrets
                key: DB_PASSWORD

        resources:
          requests:
            memory: "256Mi"
            cpu: "100"
          limits:
            memory: "512Mi"
            cpu: "200"
---
apiVersion: v1
kind: Service
metadata:
  name: payment-service
  namespace: microservices
spec:
  selector:
    app: payment-service
  ports:
    - port: 8013
      targetPort: 8013