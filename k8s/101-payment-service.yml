apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-service
  namespace: microservices
spec:
  replicas: 2
  selector:
    matchLabels:
      app: payment-service
  template:
    metadata:
      labels:
        app: payment-service
    spec:
      containers:
        - name: payment-service
          image: localhost:5000/payment-server:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8013
          env:
            - name: PAYMENT_PORT
              valueFrom:
                configMapKeyRef:
                  name: microservice-config
                  key: PAYMENT_PORT
            # database-config
            # Database password (from secret)
            - name: DB_HOST
              value: "postgres-service" # TODO: create postgres-service for postgres
            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: microservice-config
                  key: DB_PORT
            - name: DB_USER
              valueFrom:
                configMapKeyRef:
                  name: microservice-config
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-config
                  key: DB_PASSWORD
            - name: DB_NAME_PAYMENT
              valueFrom:
                configMapKeyRef:
                  name: microservice-config
                  key: DB_NAME_PAYMENT

            #            # Eureka
            #            - name: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
            #              valueFrom:
            #                configMapKeyRef:
            #                name: auth-service-config
            #                key: EUREKA_SERVER

            #            - name: SPRING_PROFILES_ACTIVE
            #              valueFrom:
            #              configMapKeyRef:
            #                name: spring-server-config
            #                key: SPRING_PROFILES_ACTIVE

            - name: KAFKA_IP4_ADDRESS
              valueFrom:
                configMapKeyRef:
                  name: microservice-config
                  key: KAFKA_IP4_ADDRESS

          resources:
            requests:
              memory: "256Mi"
              cpu: "100"
            limits:
              memory: "512Mi"
              cpu: "200"
---
apiVersion: v1
kind: Service
metadata:
  name: payment-service
  namespace: microservices
spec:
  selector:
    app: payment-service
  ports:
    - port: 8013
      targetPort: 8013