apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: microservices
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      containers:
        - name: notification-service
          image: localhost:5000/notificaation-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8014
          env:
            - name: NOTIFICATION_PORT
              valueFrom:
                configMapKeyRef:
                  name: microservice-config
                  key: NOTIFICATION_PORT
            # database-config
            # Database password (from secret)
            - name: DB_HOST
              value: "postgres-service" # TODO: create postgres-service for postgres
            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: microservice-config
                  key: DB_PORT
            - name: DB_USER
              valueFrom:
                configMapKeyRef:
                  name: microservice-config
                  key: DB_USER

            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-config
                  key: DB_PASSWORD
            - name: DB_NAME_NOTIFICATION
              valueFrom:
                configMapKeyRef:
                  name: microservice-config
                  key: DB_NAME_NOTIFICATION
            # Eureka
            #            - name: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
            #              valueFrom:
            #                configMapKeyRef:
            #                name: auth-service-config
            #                key: EUREKA_SERVER
            - name: KAFKA_IP4_ADDRESS
              valueFrom:
                configMapKeyRef:
                  name: microservice-config
                  key: KAFKA_IP4_ADDRESS
          #            - name: SPRING_PROFILES_ACTIVE
          #              valueFrom:
          #                configMapKeyRef:
          #                name: spring-server-config
          #                key: SPRING_PROFILES_ACTIVE
          resources:
            requests:
              memory: "256Mi"
              cpu: "100"
            limits:
              memory: "512Mi"
              cpu: "200"

---
apiVersion: v1
kind: Service
metadata:
  name: notification-service
  namespace: microservices
spec:
  selector:
    app: notification-service
  ports:
    - port: 8014
      targetPort: 8014