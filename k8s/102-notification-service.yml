apiVersion: qpps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: microservices
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels: notification-service
  spec:
    containers:
      - name: notification-service
        image: localhost:5000/notificaation-service:latest
        imagePullPolicy: always
        env:
          - name: NOTIFICATION_PORT
            valueFrom:
              configMapKeyRef:
                name: microservices-config
                key: NOTIFICATION_PORT
          - name: KAFKA_IP4_ADDRESS
            valueFrom:
              configMapKeyRef:
                name: microservices-config
                key: KAFKA_IP4_ADDRESS
          - name: SPRING_PROFILES_ACTIVE
            valueFrom:
            configMapKeyRef:
              name: springBoot-serverProfile-config
              key: SPRING_PROFILES_ACTIVE
          # database-config
          - name: DB_HOST
            value: "postgres-service" # TODO: create postgres-service for postgres
          - name: DB_PORT
            valueFrom:
              configMapKeyRef:
                name: microservices-config
                key: DB_PORT
          - name: DB_USER
            valueFrom:
              configMapKeyRef:
                name: microservices-config
                key: DB_USER
          - name: DB_NAME_NOTIFICATION
            valueFrom:
              configMapKeyRef:
                name: microservices-config
                key: DB_NAME_NOTIFICATION
          # Eureka
          - name: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
            valueFrom:
              configMapKeyRef:
              name: auth-service-config
              key: EUREKA_SERVER

          # Database password (from secret)
          - name: DB_PASSWORD
            valueFrom:
              secretKeyRef:
                name: app-secrets
                key: DB_PASSWORD


        resources:
          requests:
            memory: "256Mi"
            cpu: "100"
          limits:
            memory: "512Mi"
            cpu: "200"

---
apiVersion: v1
kind: Service
metadata:
  name: notification-service
  namespace: microservices
spec:
  selector:
    app: notification-service
  ports:
    - port: 8014
      targetPort: 8014