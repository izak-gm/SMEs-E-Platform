eureka:
  instance:
    hostname: ${SERVICES_HOST}
  client:
    service-url:
      defaultZone: http://${SERVICES_HOST}:${DISCOVERY_PORT}/eureka

spring:
  cloud:
    config:
      allow-override: true
      override-none: false
      override-system-properties: false
      fail-fast: true

management:
  tracing:
    sampling:
      probability: 1.0